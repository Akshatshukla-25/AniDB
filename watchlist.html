<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="AniRate — Your personal anime watchlist. Track and manage the anime you want to watch." />
    <title>AniRate — Watchlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="watchlist.css" />
</head>

<body>

    <!-- Navbar -->
    <nav id="navbar">
        <a href="home.html" class="nav-logo" id="nav-logo">
            <span class="logo-icon">▶</span> AniRate
        </a>
        <ul class="nav-links" id="nav-links">
            <li><a href="home.html" class="nav-link" id="nav-home">Home</a></li>
            <li><a href="search.html" class="nav-link" id="nav-search">Search</a></li>
            <li><a href="watchlist.html" class="nav-link active" id="nav-watchlist">Watchlist</a></li>
        </ul>
    </nav>

    <!-- Watchlist Hero -->
    <header id="watchlist-hero">
        <div class="wl-hero-bg"></div>
        <div class="wl-hero-content">
            <div class="wl-hero-icon">📋</div>
            <h1 class="wl-hero-title">My <span class="gradient-text">Watchlist</span></h1>
            <p class="wl-hero-subtitle">Anime you've saved — all in one place</p>
            <div class="wl-stats" id="wl-stats">
                <div class="wl-stat">
                    <span class="wl-stat-value" id="wl-count">0</span>
                    <span class="wl-stat-label">Saved</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Watchlist Actions -->
    <section class="wl-actions-bar" id="wl-actions-bar">
        <div class="wl-actions-inner">
            <div class="wl-sort-group">
                <label class="wl-sort-label" for="wl-sort">Sort by</label>
                <select class="wl-sort-select" id="wl-sort">
                    <option value="added">Recently Added</option>
                    <option value="score">Score</option>
                    <option value="title">Title (A–Z)</option>
                </select>
            </div>
            <button class="wl-clear-btn" id="wl-clear-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                    <line x1="10" y1="11" x2="10" y2="17" />
                    <line x1="14" y1="11" x2="14" y2="17" />
                </svg>
                Clear All
            </button>
        </div>
    </section>

    <!-- Watchlist Grid -->
    <section class="wl-content" id="wl-content">
        <div class="wl-grid" id="wl-grid">
            <!-- Cards injected by JS -->
        </div>

        <!-- Loader -->
        <div class="loader" id="wl-loader">
            <div class="spinner"></div>
            <p>Loading your watchlist…</p>
        </div>

        <!-- Empty State -->
        <div class="wl-empty hidden" id="wl-empty">
            <div class="wl-empty-icon">🎬</div>
            <h2>Your watchlist is empty</h2>
            <p>Discover anime and add them to your watchlist from the detail page</p>
            <a href="search.html" class="wl-empty-btn">Browse Anime</a>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer">
        <p>© 2026 <strong>AniRate</strong> — Powered by <a href="https://jikan.moe" target="_blank"
                rel="noopener">Jikan API</a></p>
    </footer>

    <script src="api.js"></script>
    <script src="watchlist.js"></script>
</body>

</html>
